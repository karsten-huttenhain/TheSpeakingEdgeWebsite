<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Sign in or create your account — The Speaking Edge course platform.">
<title>Sign In — The Speaking Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/gif" href="images/favicon.gif">
<link rel="stylesheet" href="css/tse.css">
<style>

.auth-page {
  min-height: 100vh;
  background: var(--midnight);
  display: flex; flex-direction: column;
}

.auth-body {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 100px 5% 60px;
}

.auth-card {
  background: var(--white);
  width: 100%; max-width: 440px;
  padding: 2.8rem 2.8rem 2.4rem;
  position: relative;
}

.auth-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--vermillion);
}

.auth-eyebrow {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--gold);
  margin-bottom: 0.5rem;
}

.auth-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.9rem; font-weight: 700;
  color: var(--midnight); line-height: 1.15; margin-bottom: 2rem;
}

/* Tabs */
.auth-tabs {
  display: flex; margin-bottom: 2rem;
  border-bottom: 2px solid var(--ltsteel);
}
.auth-tab {
  flex: 1; padding: 0.75rem 0;
  font-size: 0.82rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; text-align: center;
  background: none; border: none; cursor: pointer;
  color: var(--steel); border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: all 0.2s;
}
.auth-tab:hover { color: var(--midnight); }
.auth-tab.active { color: var(--midnight); border-bottom-color: var(--vermillion); }

/* Form */
.auth-panel { display: none; }
.auth-panel.active { display: block; }

.field { margin-bottom: 1.2rem; }
.field label {
  display: block; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--steel); margin-bottom: 0.4rem;
}
.field input {
  width: 100%; padding: 0.8rem 1rem;
  font-size: 1rem; font-family: 'Source Sans 3', Arial, sans-serif;
  border: 2px solid var(--ltsteel); border-radius: 3px;
  color: var(--midnight); background: var(--white);
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--gold); }
.field input.error { border-color: var(--vermillion); }

.forgot-link {
  display: block; text-align: right;
  font-size: 0.8rem; color: var(--steel);
  text-decoration: none; margin-top: 0.3rem; margin-bottom: 1.4rem;
  transition: color 0.2s;
}
.forgot-link:hover { color: var(--vermillion); }

.btn-auth {
  width: 100%; padding: 1rem;
  background: var(--vermillion); color: var(--white);
  border: none; border-radius: 3px; cursor: pointer;
  font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; font-family: 'Source Sans 3', Arial, sans-serif;
  transition: background 0.2s; margin-top: 0.4rem;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.btn-auth:hover:not(:disabled) { background: var(--vermillion-dark); }
.btn-auth:disabled { background: var(--steel); cursor: not-allowed; }

/* Messages */
.auth-message {
  border-radius: 3px; padding: 0.8rem 1rem;
  font-size: 0.88rem; line-height: 1.5;
  margin-bottom: 1.2rem; display: none;
}
.auth-message.error {
  background: #fdf3f2; border: 1px solid var(--vermillion);
  color: var(--vermillion); display: block;
}
.auth-message.success {
  background: #f0faf4; border: 1px solid #27AE60;
  color: #1e8449; display: block;
}

/* Switch prompt */
.auth-switch {
  text-align: center; margin-top: 1.6rem;
  font-size: 0.85rem; color: var(--steel);
}
.auth-switch button {
  background: none; border: none; cursor: pointer;
  color: var(--vermillion); font-weight: 700;
  font-size: 0.85rem; padding: 0; font-family: inherit;
  text-decoration: underline;
}
.auth-switch button:hover { color: var(--vermillion-dark); }

/* Password strength hint */
.password-hint {
  font-size: 0.75rem; color: var(--steel);
  margin-top: 0.3rem; display: none;
}

/* Spinner */
.spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff; animation: spin 0.7s linear infinite;
  display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Footer note */
.auth-footer-note {
  text-align: center; padding: 1.5rem;
  font-size: 0.75rem; color: rgba(255,255,255,0.35);
}
.auth-footer-note a { color: rgba(255,255,255,0.5); text-decoration: none; }
.auth-footer-note a:hover { color: var(--gold); }

</style>
</head>
<body class="auth-page">

<div id="tse-nav"></div>

<div class="auth-body">
  <div class="auth-card">

    <div class="auth-eyebrow">The Speaking Edge — Course Platform</div>
    <h1 class="auth-title">Your speaking<br>journey starts here.</h1>

    <!-- Tabs -->
    <div class="auth-tabs">
      <button class="auth-tab active" id="tab-signin" onclick="switchTab('signin')">Sign In</button>
      <button class="auth-tab" id="tab-signup" onclick="switchTab('signup')">Create Account</button>
    </div>

    <!-- ── SIGN IN PANEL ── -->
    <div class="auth-panel active" id="panel-signin">
      <div class="auth-message" id="signin-message"></div>

      <div class="field">
        <label for="signin-email">Email address</label>
        <input type="email" id="signin-email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="signin-password">Password</label>
        <input type="password" id="signin-password" placeholder="Your password" autocomplete="current-password">
      </div>

      <a href="#" class="forgot-link" onclick="forgotPassword(event)">Forgot your password?</a>

      <button class="btn-auth" id="signin-btn" onclick="signIn()">
        <span class="spinner" id="signin-spinner"></span>
        Sign In
      </button>

      <div class="auth-switch">
        Don't have an account?
        <button onclick="switchTab('signup')">Create one free</button>
      </div>
    </div>

    <!-- ── SIGN UP PANEL ── -->
    <div class="auth-panel" id="panel-signup">
      <div class="auth-message" id="signup-message"></div>

      <div class="field">
        <label for="signup-name">Full name</label>
        <input type="text" id="signup-name" placeholder="Your full name" autocomplete="name">
      </div>

      <div class="field">
        <label for="signup-email">Email address</label>
        <input type="email" id="signup-email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="field">
        <label for="signup-password">Password</label>
        <input type="password" id="signup-password" placeholder="At least 8 characters"
               autocomplete="new-password" oninput="checkPasswordStrength(this.value)">
        <div class="password-hint" id="password-hint"></div>
      </div>

      <div class="field">
        <label for="signup-confirm">Confirm password</label>
        <input type="password" id="signup-confirm" placeholder="Repeat your password" autocomplete="new-password">
      </div>

      <button class="btn-auth" id="signup-btn" onclick="signUp()" style="margin-top:0.8rem;">
        <span class="spinner" id="signup-spinner"></span>
        Create Account
      </button>

      <div class="auth-switch">
        Already have an account?
        <button onclick="switchTab('signin')">Sign in</button>
      </div>
    </div>

  </div>
</div>

<div class="auth-footer-note">
  By creating an account you agree to our
  <a href="terms-of-service.html">Terms of Service</a> and
  <a href="privacy-policy.html">Privacy Policy</a>.
</div>

<div id="tse-footer"></div>
<script src="js/components.js"></script>
<script src="js/tse.js"></script>

<!-- Supabase JS client -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
'use strict';

// ── CONFIG — replace with your Supabase project credentials ──────────────────
// These values come from: Supabase Dashboard → Project Settings → API
const SUPABASE_URL      = 'https://bkfkupyvwfbposjumcyq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_uBXJ0SDLFnAz7UWh_sQtXA_8e50aZjz';
// ─────────────────────────────────────────────────────────────────────────────

const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// Redirect if already logged in
supabase.auth.getSession().then(({ data: { session } }) => {
  if (session) window.location.href = 'dashboard.html';
});

// ── TABS ──────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.auth-tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.auth-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  clearMessages();
}

function clearMessages() {
  document.querySelectorAll('.auth-message').forEach(m => {
    m.className = 'auth-message'; m.textContent = '';
  });
}

function showMessage(id, type, text) {
  const el = document.getElementById(id);
  el.className = 'auth-message ' + type;
  el.textContent = text;
}

function setLoading(btnId, spinnerId, loading) {
  document.getElementById(btnId).disabled = loading;
  const spinner = document.getElementById(spinnerId);
  spinner.style.display = loading ? 'block' : 'none';
}

// ── PASSWORD STRENGTH ─────────────────────────────────────────────────────────
function checkPasswordStrength(val) {
  const hint = document.getElementById('password-hint');
  hint.style.display = val.length > 0 ? 'block' : 'none';
  if (val.length < 8)        { hint.style.color = '#c0392b'; hint.textContent = 'Too short — minimum 8 characters'; }
  else if (val.length < 12)  { hint.style.color = '#b7950b'; hint.textContent = 'Acceptable — longer is stronger'; }
  else                       { hint.style.color = '#1e8449'; hint.textContent = 'Strong password'; }
}

// ── SIGN IN ───────────────────────────────────────────────────────────────────
async function signIn() {
  const email    = document.getElementById('signin-email').value.trim();
  const password = document.getElementById('signin-password').value;

  if (!email || !password) {
    showMessage('signin-message', 'error', 'Please enter your email and password.');
    return;
  }

  setLoading('signin-btn', 'signin-spinner', true);
  clearMessages();

  const { error } = await supabase.auth.signInWithPassword({ email, password });

  if (error) {
    setLoading('signin-btn', 'signin-spinner', false);
    const msg = error.message === 'Invalid login credentials'
      ? 'Incorrect email or password. Please try again.'
      : error.message;
    showMessage('signin-message', 'error', msg);
    return;
  }

  window.location.href = 'dashboard.html';
}

// ── SIGN UP ───────────────────────────────────────────────────────────────────
async function signUp() {
  const name     = document.getElementById('signup-name').value.trim();
  const email    = document.getElementById('signup-email').value.trim();
  const password = document.getElementById('signup-password').value;
  const confirm  = document.getElementById('signup-confirm').value;

  if (!name)                        { showMessage('signup-message', 'error', 'Please enter your full name.'); return; }
  if (!email)                       { showMessage('signup-message', 'error', 'Please enter your email address.'); return; }
  if (password.length < 8)         { showMessage('signup-message', 'error', 'Password must be at least 8 characters.'); return; }
  if (password !== confirm)         { showMessage('signup-message', 'error', 'Passwords do not match.'); return; }

  setLoading('signup-btn', 'signup-spinner', true);
  clearMessages();

  const { error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { full_name: name }
    }
  });

  setLoading('signup-btn', 'signup-spinner', false);

  if (error) {
    showMessage('signup-message', 'error', error.message);
    return;
  }

  showMessage('signup-message', 'success',
    'Account created — please check your email to confirm your address, then sign in.');
}

// ── FORGOT PASSWORD ───────────────────────────────────────────────────────────
async function forgotPassword(e) {
  e.preventDefault();
  const email = document.getElementById('signin-email').value.trim();
  if (!email) {
    showMessage('signin-message', 'error', 'Enter your email address above first.');
    return;
  }
  clearMessages();
  const { error } = await supabase.auth.resetPasswordForEmail(email, {
    redirectTo: window.location.origin + '/dashboard.html'
  });
  if (error) {
    showMessage('signin-message', 'error', error.message);
  } else {
    showMessage('signin-message', 'success', 'Password reset email sent — check your inbox.');
  }
}

// ── ENTER KEY SUPPORT ─────────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const activePanel = document.querySelector('.auth-panel.active').id;
  if (activePanel === 'panel-signin') signIn();
  if (activePanel === 'panel-signup') signUp();
});
</script>
</body>
</html>
