<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#2C3E50"/>
  <defs>
    <style>
      .fb { transform-origin: center 50px; animation: fpulse 1.4s ease-in-out infinite; }
      .fb0  { animation-delay:0.00s; animation-duration:1.6s; }
      .fb1  { animation-delay:0.08s; animation-duration:1.4s; }
      .fb2  { animation-delay:0.16s; animation-duration:1.7s; }
      .fb3  { animation-delay:0.05s; animation-duration:1.3s; }
      .fb4  { animation-delay:0.24s; animation-duration:1.5s; }
      .fb5  { animation-delay:0.12s; animation-duration:1.8s; }
      .fb6  { animation-delay:0.32s; animation-duration:1.4s; }
      .fb7  { animation-delay:0.20s; animation-duration:1.6s; }
      .fb8  { animation-delay:0.40s; animation-duration:1.5s; }
      .fb9  { animation-delay:0.28s; animation-duration:1.3s; }
      @keyframes fpulse {
        0%   { transform:scaleY(1);    opacity:1; }
        30%  { transform:scaleY(1.5);  opacity:0.9; }
        60%  { transform:scaleY(0.5);  opacity:0.65; }
        100% { transform:scaleY(1);    opacity:1; }
      }
    </style>
  </defs>
  <g transform="translate(8,50)">
    <rect class="fb fb0" x="0"  y="-4"  width="6" height="8"  rx="3" fill="#C8392B" opacity="0.30"/>
    <rect class="fb fb1" x="9"  y="-12" width="6" height="24" rx="3" fill="#C8392B" opacity="0.50"/>
    <rect class="fb fb2" x="18" y="-8"  width="6" height="16" rx="3" fill="#C8392B" opacity="0.40"/>
    <rect class="fb fb3" x="27" y="-28" width="6" height="56" rx="3" fill="#E8A020"/>
    <rect class="fb fb4" x="36" y="-10" width="6" height="20" rx="3" fill="#C8392B" opacity="0.45"/>
    <rect class="fb fb5" x="45" y="-20" width="6" height="40" rx="3" fill="#C8392B" opacity="0.65"/>
    <rect class="fb fb6" x="54" y="-8"  width="6" height="16" rx="3" fill="#C8392B" opacity="0.38"/>
    <rect class="fb fb7" x="63" y="-14" width="6" height="28" rx="3" fill="#C8392B" opacity="0.50"/>
    <rect class="fb fb8" x="72" y="-30" width="6" height="60" rx="3" fill="#E8A020" opacity="0.90"/>
    <rect class="fb fb9" x="81" y="-22" width="6" height="44" rx="3" fill="#C8392B"/>
  </g>
</svg>
