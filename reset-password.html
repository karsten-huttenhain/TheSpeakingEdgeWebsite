<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<title>Reset Password — The Speaking Edge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,400;1,700&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/gif" href="images/favicon.gif">
<link rel="stylesheet" href="css/tse.css">
<style>
.auth-page {
  min-height: 100vh; background: var(--midnight);
  display: flex; flex-direction: column;
}
.auth-body {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 100px 5% 60px;
}
.auth-card {
  background: var(--white); width: 100%; max-width: 440px;
  padding: 2.8rem 2.8rem 2.4rem; position: relative;
}
.auth-card::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px;
  background: var(--vermillion);
}
.auth-eyebrow {
  font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 0.5rem;
}
.auth-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 1.9rem; font-weight: 700;
  color: var(--midnight); line-height: 1.15; margin-bottom: 2rem;
}
.field { margin-bottom: 1.2rem; }
.field label {
  display: block; font-size: 0.78rem; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--steel); margin-bottom: 0.4rem;
}
.field input {
  width: 100%; padding: 0.8rem 1rem;
  font-size: 1rem; font-family: 'Source Sans 3', Arial, sans-serif;
  border: 2px solid var(--ltsteel); border-radius: 3px;
  color: var(--midnight); background: var(--white);
  outline: none; transition: border-color 0.2s;
}
.field input:focus { border-color: var(--gold); }
.btn-auth {
  width: 100%; padding: 1rem;
  background: var(--vermillion); color: var(--white);
  border: none; border-radius: 3px; cursor: pointer;
  font-size: 0.9rem; font-weight: 700; letter-spacing: 0.08em;
  text-transform: uppercase; font-family: 'Source Sans 3', Arial, sans-serif;
  transition: background 0.2s; margin-top: 0.4rem;
  display: flex; align-items: center; justify-content: center; gap: 0.5rem;
}
.btn-auth:hover:not(:disabled) { background: var(--vermillion-dark); }
.btn-auth:disabled { background: var(--steel); cursor: not-allowed; }
.auth-message {
  border-radius: 3px; padding: 0.8rem 1rem;
  font-size: 0.88rem; line-height: 1.5; margin-bottom: 1.2rem; display: none;
}
.auth-message.error   { background: #fdf3f2; border: 1px solid var(--vermillion); color: var(--vermillion); display: block; }
.auth-message.success { background: #f0faf4; border: 1px solid #27AE60; color: #1e8449; display: block; }
.password-hint { font-size: 0.75rem; color: var(--steel); margin-top: 0.3rem; display: none; }
.spinner {
  width: 16px; height: 16px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.4);
  border-top-color: #fff; animation: spin 0.7s linear infinite; display: none;
}
@keyframes spin { to { transform: rotate(360deg); } }
#waiting-state { text-align: center; padding: 1rem 0; color: var(--steel); font-size: 0.9rem; }
</style>
</head>
<body class="auth-page">

<div class="auth-body">
  <div class="auth-card">

    <div class="auth-eyebrow">The Speaking Edge — Course Platform</div>
    <h1 class="auth-title">Set a new<br>password.</h1>

    <div class="auth-message" id="page-message"></div>

    <!-- Shown while waiting for Supabase to confirm the recovery session -->
    <div id="waiting-state">Verifying your reset link…</div>

    <!-- Shown once recovery session is confirmed -->
    <div id="reset-form" style="display:none;">
      <div class="field">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" placeholder="At least 8 characters"
               autocomplete="new-password" oninput="checkStrength(this.value)">
        <div class="password-hint" id="password-hint"></div>
      </div>
      <div class="field">
        <label for="confirm-password">Confirm new password</label>
        <input type="password" id="confirm-password" placeholder="Repeat your password"
               autocomplete="new-password">
      </div>
      <button class="btn-auth" id="reset-btn" onclick="doReset()">
        <span class="spinner" id="reset-spinner"></span>
        Set new password
      </button>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
'use strict';

const SUPABASE_URL      = 'https://bkfkupyvwfbposjumcyq.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_uBXJ0SDLFnAz7UWh_sQtXA_8e50aZjz';

const authClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

function showMessage(type, text) {
  const el = document.getElementById('page-message');
  el.className = 'auth-message ' + type;
  el.textContent = text;
}

function checkStrength(val) {
  const hint = document.getElementById('password-hint');
  hint.style.display = val.length > 0 ? 'block' : 'none';
  if (val.length < 8)       { hint.style.color = '#c0392b'; hint.textContent = 'Too short — minimum 8 characters'; }
  else if (val.length < 12) { hint.style.color = '#b7950b'; hint.textContent = 'Acceptable — longer is stronger'; }
  else                      { hint.style.color = '#1e8449'; hint.textContent = 'Strong password'; }
}

// Supabase fires PASSWORD_RECOVERY when the reset link is valid
authClient.auth.onAuthStateChange((event) => {
  if (event === 'PASSWORD_RECOVERY') {
    document.getElementById('waiting-state').style.display = 'none';
    document.getElementById('reset-form').style.display    = 'block';
  }
  if (event === 'SIGNED_IN') {
    // Catch-all: if already signed in and no recovery, go to dashboard
  }
});

// Fallback: if the event doesn't fire within 4s, show an error
setTimeout(() => {
  if (document.getElementById('reset-form').style.display === 'none') {
    document.getElementById('waiting-state').style.display = 'none';
    showMessage('error', 'This reset link has expired or is invalid. Please request a new one from the sign-in page.');
  }
}, 4000);

async function doReset() {
  const password = document.getElementById('new-password').value;
  const confirm  = document.getElementById('confirm-password').value;

  if (password.length < 8)   { showMessage('error', 'Password must be at least 8 characters.'); return; }
  if (password !== confirm)  { showMessage('error', 'Passwords do not match.'); return; }

  const btn = document.getElementById('reset-btn');
  btn.disabled = true;
  document.getElementById('reset-spinner').style.display = 'block';

  const { error } = await authClient.auth.updateUser({ password });

  if (error) {
    btn.disabled = false;
    document.getElementById('reset-spinner').style.display = 'none';
    showMessage('error', error.message);
    return;
  }

  showMessage('success', 'Password updated — taking you to your dashboard…');
  setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
}

document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('reset-form').style.display !== 'none') doReset();
});
</script>
</body>
</html>
